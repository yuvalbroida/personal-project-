name: Echo AI Contextual Supply Chain Scan

on:
  pull_request:
    branches: [ "main" ]

jobs:
  echo-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Echo Contextual Scanner
        run: python echo_mock_engine.py